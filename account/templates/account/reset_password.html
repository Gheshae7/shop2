{% load static %}

<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بازیابی کلمه عبور</title>

    <link rel="stylesheet" href="{% static "assets/css/output.css" %}">

    <style>


        .form-grid {
            display: grid;
        }

        .form-grid>div {
            grid-area: 1 / 1 / 2 / 2;
        }

        /* منحنی انیمیشن فوق‌العاده نرم (Fluid Easing) */
        @keyframes softFadeUp {
            0% {
                opacity: 0;
                transform: translateY(20px) scale(0.97);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .stagger-item {
            opacity: 0;
            animation: softFadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .delay-1 {
            animation-delay: 0.1s;
        }

        .delay-2 {
            animation-delay: 0.2s;
        }

        .delay-3 {
            animation-delay: 0.3s;
        }

        .delay-4 {
            animation-delay: 0.4s;
        }

        .delay-5 {
            animation-delay: 0.5s;
        }

        /* پنهان کردن اسکرول‌بار */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body x-data="{ 
        isLogin: true, 
        mouseX: 0, 
        mouseY: 0,
        updateMouse(e) {
            // دریافت مختصات دقیق موس
            this.mouseX = e.clientX;
            this.mouseY = e.clientY;
        }
      }" @mousemove.window="updateMouse"
    class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden text-slate-800">

    <!-- برای پیام های پاپ آپ -->
    {% if messages %}
    <script src="{% static "assets/js/sweetalert2.min.js" %}"></script>
      <script>
        {% for message in messages %}
            Swal.fire({
            position: "top-start",
            icon: "{{ message.tags }}",
            title: "{{ message }}",
            showConfirmButton: false,
            timer: 3500
            });
        {% endfor %}
      </script>
    {% endif %}


    <!-- پس‌زمینه اصلی -->
    <div class="absolute inset-0 bg-[#f8fafc] -z-30"></div>

    <!-- === گرادیان محو دنبال‌کننده موس === -->
    <div class="absolute top-0 left-0 w-[600px] h-[600px] bg-gradient-to-tr from-blue-200/50 via-purple-200/40 to-teal-100/50 rounded-full blur-[100px] mix-blend-multiply pointer-events-none -z-20 will-change-transform"
        style="transition: transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);"
        :style="`transform: translate(calc(${mouseX}px - 300px), calc(${mouseY}px - 300px))`"></div>

    <!-- دکمه بازگشت با استایل نرم -->

<a href="{% url "home:home_page" %}"
        class="absolute top-6 right-6 flex items-center gap-2 text-slate-500 hover:text-blue-600 transition-colors duration-500 font-medium bg-white/50 px-5 py-2.5 rounded-2xl backdrop-blur-xl border border-white/60 hover:shadow-[0_8px_30px_rgba(37,99,235,0.1)] z-20">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
            class="w-5 h-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
        </svg>
        <span class="text-sm">بازگشت به فروشگاه</span>
    </a>

    <!-- کارت اصلی با افکت شیشه‌ای لایت -->
    <div
        class="relative w-full max-w-md bg-white/60 backdrop-blur-3xl rounded-[2.5rem] border border-white/80 shadow-[0_20px_40px_-15px_rgba(0,0,0,0.05)] p-8 md:p-10 z-10 overflow-hidden">

        <div class="form-grid">

            <!-- === فرم ورود === -->
            <div x-show="isLogin" x-transition:enter="transition ease-out duration-[800ms]"
                x-transition:enter-start="opacity-0 translate-y-6 scale-95"
                x-transition:enter-end="opacity-100 translate-y-0 scale-100"
                x-transition:leave="transition ease-in duration-[400ms] absolute w-full"
                x-transition:leave-start="opacity-100 translate-y-0 scale-100"
                x-transition:leave-end="opacity-0 -translate-y-6 scale-95" class="w-full">

                <div class="text-center mb-8 stagger-item delay-1">
                    <h2 class="text-3xl font-extrabold text-slate-800 mb-2">بازیابی کلمه عبور</h2>
                    <p class="text-slate-500 text-sm">رمز عبور جدید خود را وارد کنید</p>
                </div>

                <form class="space-y-5" name='reset_password' method='POST' action='{% url "account:reset_password_page" email_active_code=user_email_active_code %}'>
                    {% csrf_token %}

                    <div class="stagger-item delay-3">
                        <div class="flex items-center justify-between mb-2 ml-1">
                            <label class="block text-sm font-medium text-slate-600">رمز عبور</label>
                        </div>
                            {{ reset_form.password }}
                    </div>

                    <div class="stagger-item delay-3">
                        <div class="flex items-center justify-between mb-2 ml-1">
                            <label class="block text-sm font-medium text-slate-600">رمز عبور تکرار</label>
                        </div>
                            {{ reset_form.confirm_password }}
                    </div>

                    <div class="stagger-item delay-4 pt-2">
                        <button
                            class="cursor-pointer w-full bg-slate-800 hover:bg-blue-600 text-white font-medium py-4 rounded-2xl shadow-[0_8px_20px_rgba(0,0,0,0.1)] hover:shadow-[0_12px_30px_rgba(37,99,235,0.25)] transition-all duration-500 hover:-translate-y-1 active:translate-y-0 active:scale-[0.98]" type="submit">
                            بازیابی کلمه عبور
                        </button>
                    </div>
                </form>
        </div>
    </div>
    <script src="{% static "assets/js/alpine.js" %}"></script>
</body>

</html>
